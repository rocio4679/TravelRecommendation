<!DOCTYPE html>
<html>
    <head>
        <title>Contact Us</title>
        <link rel="stylesheet" href="./travel_recommendation.css">
    </head>
    <body>
        <nav>
            <div class="topbar">
                <div class="links">
                    <a href="./travel_recommendation.html" id="Home">Home</a>
                    <a href="./about_us.html" id="About">About Us</a>
                    <a href="./contact_us.html" id="Contact">Contact Us</a>
                </div>
            </div>
        </nav>
        <div class="IntroText">
            <h1 class="BodyHeader">CONTACT US</h1>
            <h4 class="ContactText">Get in Touch</h4>
        </div>
        <form id="ContactForm">
            <label id="lblName">Name:</label>
            <input id="name" value="Enter your name..."></input>
            <br>
            <label id="lblEmail">Email:</label>
            <input id="email" value="Enter your email..."></input>
            <br>
            <label id="message">Message: </label>
            <textarea id="Message" value="Enter your message..." rows="4" cols="50"></textarea>
            <button id="Submit">Submit</button>
        </form>
        <img src="./facebooklogo.png" width="45px" height="45px"></img>
        <img src="./insta-logo.png" width="50px" height="50px"></img>
        <img src="./twittericon.png" width="50px" height="50px"></img>
        <img src="./youtubeicon.png" width="50px" height="50px"></img>
    </body>
</html>
